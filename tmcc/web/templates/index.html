<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMCC Command Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --panel: #f5f5f5;
            --border: #dde1e7;
            --accent: #c47a00;
            --accent2: #1a6fa0;
            --text: #1a1a1a;
            --text-dim: #888888;
            --green: #1a8a4a;
            --red: #cc2200;
            --mono: 'Share Tech Mono', monospace;
            --head: 'Oswald', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            min-height: 100vh;
            overflow-x: hidden;
        }

        header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        .logo {
            font-family: var(--head);
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .logo span {
            color: var(--text-dim);
            font-weight: 300;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            margin-left: auto;
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: var(--red);
            box-shadow: 0 0 8px var(--red);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-label {
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .tabs {
            display: flex;
            gap: 0;
            padding: 0 32px;
            border-bottom: 1px solid var(--border);
            background: var(--panel);
        }

        .tab {
            padding: 14px 24px;
            font-family: var(--head);
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .tab:hover { color: var(--text); }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .content { padding: 32px; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .panel-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 24px;
        }

        .panel-title {
            font-family: var(--head);
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
        }

        .update-time {
            font-size: 11px;
            color: var(--text-dim);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead tr { border-bottom: 2px solid var(--accent); }

        th {
            font-family: var(--head);
            font-weight: 400;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            padding: 10px 16px;
            text-align: left;
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        tbody tr:hover { background: rgba(0,0,0,0.03); }

        td {
            padding: 12px 16px;
            vertical-align: middle;
        }

        .engine-id {
            font-family: var(--head);
            font-size: 20px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .speed-bar-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .speed-val {
            width: 28px;
            text-align: right;
            color: var(--accent2);
        }

        .speed-bar {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            max-width: 120px;
        }

        .speed-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s ease, background 0.4s ease;
        }

        .dir-badge {
            display: inline-block;
            padding: 2px 8px;
            font-size: 10px;
            letter-spacing: 1px;
            border-radius: 2px;
            font-family: var(--head);
        }

        .dir-forward {
            background: rgba(26,138,74,0.1);
            color: var(--green);
            border: 1px solid rgba(26,138,74,0.3);
        }

        .dir-reverse {
            background: rgba(204,34,0,0.1);
            color: var(--red);
            border: 1px solid rgba(204,34,0,0.3);
        }

        .bell-on { color: var(--accent); }
        .bell-off { color: var(--text-dim); }

        .last-cmd {
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .comment {
            color: var(--text-dim);
            font-size: 11px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ts { color: var(--text-dim); font-size: 11px; }

        .max-speed-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .max-speed-input {
            width: 70px;
            padding: 3px 6px;
            font-family: var(--mono);
            font-size: 12px;
            border: 1px solid var(--border);
            border-radius: 3px;
            background: var(--bg);
            color: var(--text);
        }

        .max-speed-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .set-btn {
            padding: 3px 8px;
            font-family: var(--head);
            font-size: 10px;
            letter-spacing: 1px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .set-btn:hover { opacity: 0.8; }
        .set-btn.saved { background: var(--green); }

        .abs-btn {
            padding: 3px 8px;
            font-family: var(--head);
            font-size: 10px;
            letter-spacing: 1px;
            background: var(--accent2);
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .abs-btn:hover { opacity: 0.8; }
        .abs-btn.sent { background: var(--green); }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
            font-size: 13px;
            letter-spacing: 2px;
        }

        .empty-state::before {
            content: '[ NO ENGINES DETECTED ]';
            display: block;
            font-family: var(--head);
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--border);
        }

        @keyframes flash {
            0% { background: rgba(196,122,0,0.08); }
            100% { background: transparent; }
        }

        tr.updated { animation: flash 0.6s ease-out; }
    </style>
</head>
<body>

<header>
    <img src="/static/images/logo.png" alt="Logo" style="height: 80px;">
    <div class="logo">TMCC <span>Command Hub</span></div>
    <div class="status-label" id="status-label">CONNECTING</div>
    <div class="status-dot disconnected" id="status-dot"></div>
</header>

<nav class="tabs">
    <div class="tab active" data-tab="speed">Speed Monitor</div>
</nav>

<div class="content">
    <div class="tab-panel active" id="tab-speed">
        <div class="panel-header">
            <div class="panel-title">Engine Status</div>
            <div class="update-time" id="update-time"></div>
        </div>
        <div id="engine-table-wrap">
            <div class="empty-state" id="empty-state">Waiting for engine data...</div>
            <table id="engine-table" style="display:none">
                <thead>
                    <tr>
                        <th>Engine</th>
                        <th>Speed</th>
                        <th>Max Speed</th>
                        <th>Direction</th>
                        <th>Bell</th>
                        <th>Last Command</th>
                        <th>Comment</th>
                        <th>Cmd Time</th>
                        <th>Msg Time</th>
                    </tr>
                </thead>
                <tbody id="engine-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        });
    });

    const dot = document.getElementById('status-dot');
    const statusLabel = document.getElementById('status-label');
    const tbody = document.getElementById('engine-tbody');
    const table = document.getElementById('engine-table');
    const emptyState = document.getElementById('empty-state');
    const updateTime = document.getElementById('update-time');

    function setConnected(ok) {
        dot.className = 'status-dot' + (ok ? '' : ' disconnected');
        statusLabel.textContent = ok ? 'LIVE' : 'DISCONNECTED';
    }

    const engines = {};

 function getCmdColor(cmdTimestamp) {
    if (!cmdTimestamp) return '#bbbbbb';
    const now = new Date();
    const today = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const ageSecs = (now - new Date(`${today}T${cmdTimestamp}`)) / 1000;
    if (ageSecs <= 3) return '#008B00';
    if (ageSecs <= 7) return '#cc9900';
    if (ageSecs <= 15) return '#B80000';
    return '#bbbbbb';
}

    function getBarColor(pct) {
        if (pct >= 80) return '#8B0000';
        if (pct >= 75) return '#B8860B';
        return '#006400';
    }

    function setMaxSpeed(engineId, btn) {
        const input = document.getElementById('max-speed-input-' + engineId);
        const val = parseInt(input.value);
        if (isNaN(val) || val < 0) {
            input.style.borderColor = 'var(--red)';
            return;
        }
        input.style.borderColor = '';
        fetch(`/engine/${engineId}/max_speed`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ max_speed: val })
        }).then(r => r.json()).then(data => {
            if (data.ok) {
                btn.textContent = 'SAVED';
                btn.classList.add('saved');
                setTimeout(() => {
                    btn.textContent = 'SET';
                    btn.classList.remove('saved');
                }, 1500);
            }
        });
    }

    function sendAbsSpeed(engineId, btn) {
        const input = document.getElementById('max-speed-input-' + engineId);
        const val = parseInt(input.value);
        if (isNaN(val) || val < 0) {
            input.style.borderColor = 'var(--red)';
            return;
        }
        input.style.borderColor = '';
        fetch(`/engine/${engineId}/send_abs_speed`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ speed: val })
        }).then(r => r.json()).then(data => {
            if (data.ok) {
                btn.textContent = 'SENT';
                btn.classList.add('sent');
                setTimeout(() => {
                    btn.textContent = 'ABS SEND';
                    btn.classList.remove('sent');
                }, 1500);
            }
        });
    }

    function renderEngines() {
        const ids = Object.keys(engines).sort((a, b) => a - b);
        if (ids.length === 0) {
            table.style.display = 'none';
            emptyState.style.display = 'block';
            return;
        }
        table.style.display = 'table';
        emptyState.style.display = 'none';

        ids.forEach(id => {
            const e = engines[id];
            const maxSpd = e.max_speed || 2000000;
            const pct = maxSpd === 2000000 ? 0 : Math.round((e.speed / maxSpd) * 100);
            const barColor = getBarColor(pct);
            const dirClass = e.direction === 'Forward' ? 'dir-forward' : 'dir-reverse';
            const bellClass = e.bell ? 'bell-on' : 'bell-off';
            const bellLabel = e.bell ? '🔔 ON' : 'OFF';
            const cmdColor = getCmdColor(e.command_timestamp);

            let row = document.getElementById('engine-row-' + id);
            if (!row) {
                row = document.createElement('tr');
                row.id = 'engine-row-' + id;
                tbody.appendChild(row);
            }

            const existingInput = document.getElementById('max-speed-input-' + id);
            const inputVal = existingInput ? existingInput.value : (maxSpd === 2000000 ? '' : maxSpd);

            row.innerHTML = `
                <td><span class="engine-id">${id}</span></td>
                <td>
                    <div class="speed-bar-wrap">
                        <span class="speed-val">${e.speed}</span>
                        <div class="speed-bar">
                            <div class="speed-fill" style="width:${pct}%; background:${barColor}"></div>
                        </div>
                    </div>
                </td>
                <td>
                    <div class="max-speed-wrap">
                        <input class="max-speed-input" id="max-speed-input-${id}"
                               type="text" value="${inputVal}"
                               placeholder="unlimited">
                        <button class="set-btn" onclick="setMaxSpeed(${id}, this)">SET</button>
                        <button class="abs-btn" onclick="sendAbsSpeed(${id}, this)">ABS SEND</button>
                    </div>
                </td>
                <td><span class="dir-badge ${dirClass}">${e.direction}</span></td>
                <td><span class="${bellClass}">${bellLabel}</span></td>
                <td><span class="last-cmd" style="color:${cmdColor}">${e.last_command || ''}</span></td>
                <td><span class="comment">${e.line_comment || ''}</span></td>
                <td><span class="ts">${e.command_timestamp || ''}</span></td>
                <td><span class="ts">${e.message_timestamp || ''}</span></td>
            `;

            row.classList.remove('updated');
            void row.offsetWidth;
            row.classList.add('updated');
        });

        updateTime.textContent = 'updated ' + new Date().toLocaleTimeString();
    }

    // Only update colors — do NOT rebuild rows
    setInterval(() => {
        Object.keys(engines).forEach(id => {
            const e = engines[id];
            const span = document.querySelector(`#engine-row-${id} .last-cmd`);
            if (span) {
                span.style.color = getCmdColor(e.command_timestamp);
            }
        });
    }, 1000);

    const evtSource = new EventSource('/stream');

    evtSource.onopen = () => setConnected(true);
    evtSource.onerror = () => setConnected(false);

    evtSource.addEventListener('engine', e => {
        const data = JSON.parse(e.data);
        engines[data.id] = data;
        renderEngines();
    });
</script>
</body>
</html>
